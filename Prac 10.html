<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iframe Demo Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Iframe & Map Embedding Demo</h1>
</header>

<div class="container">

    <!-- Left Menu -->
    <nav>
        <h3>Menu</h3>
        <ul>
            <li><a href="https://www.wikipedia.org" target="contentFrame">Wikipedia</a></li>
            <li><a href="https://www.openai.com" target="contentFrame">OpenAI</a></li>
            <li><a href="https://www.example.com" target="contentFrame">Example</a></li>
        </ul>
    </nav>

    <!-- Main Content Frame -->
    <main>
        <iframe name="contentFrame" src="https://www.example.com"></iframe>
    </main>

</div>

<!-- Map Section -->
<section class="map-section">
    <h2>Embedded Google Map</h2>

    <iframe 
        src="https://www.google.com/maps?q=Nagpur&output=embed"
        width="100%" 
        height="300" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy">
    </iframe>

</section>

<footer>
    <p>© 2026 Iframe Demo Page</p>
</footer>

</body>
</html>
