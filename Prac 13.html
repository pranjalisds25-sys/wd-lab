<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Advanced Bootstrap Site</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  body.dark-mode {
    background-color: #121212;
    color: #fff;
  }
  .dark-mode .card {
    background-color: #1e1e1e;
  }
</style>
</head>

<body>

<!-- 🔷 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">MyApp</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link active">Home</a></li>

        <!-- Dropdown -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Menu</a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item">Profile</a></li>
            <li><a class="dropdown-item">Settings</a></li>
          </ul>
        </li>

        <!-- Dark Mode -->
        <li class="nav-item">
          <button class="btn btn-sm btn-light ms-2" onclick="toggleDarkMode()">🌙</button>
        </li>

        <!-- Login Button -->
        <li class="nav-item">
          <button class="btn btn-success ms-2" data-bs-toggle="modal" data-bs-target="#loginModal">
            Login
          </button>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- 🔷 Breadcrumb -->
<div class="container mt-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">Home</li>
    <li class="breadcrumb-item active">Dashboard</li>
  </ol>
</div>

<!-- 🔷 Layout -->
<div class="container mt-4">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-lg-3 col-md-4 mb-3">
      <div class="card p-3">
        <h5>Sidebar</h5>
        <p>Responsive sidebar</p>
      </div>
    </div>

    <!-- Main -->
    <div class="col-lg-9 col-md-8">
      <div class="card p-3">
        <h5>Dashboard</h5>

        <!-- Chart -->
        <canvas id="myChart"></canvas>

        <button class="btn btn-primary mt-3" data-bs-toggle="modal" data-bs-target="#mainModal">
          Open Modal
        </button>
      </div>
    </div>

  </div>
</div>

<!-- 🔷 Form -->
<div class="container mt-5">
  <h3>Contact Form</h3>
  <form>
    <div class="row">
      <div class="col-md-6 mb-3">
        <input type="text" class="form-control" placeholder="Name">
      </div>
      <div class="col-md-6 mb-3">
        <input type="email" class="form-control" placeholder="Email">
      </div>
    </div>
    <textarea class="form-control mb-3" placeholder="Message"></textarea>
    <button class="btn btn-success">Submit</button>
  </form>
</div>

<!-- 🔷 Login Modal -->
<div class="modal fade" id="loginModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Login</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="email" class="form-control mb-2" placeholder="Email">
        <input type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-success w-100">Login</button>

        <p class="mt-2 text-center">
          Don't have an account?
          <a href="#" data-bs-toggle="modal" data-bs-target="#signupModal">Signup</a>
        </p>
      </div>

    </div>
  </div>
</div>

<!-- 🔷 Signup Modal -->
<div class="modal fade" id="signupModal">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Signup</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input class="form-control mb-2" placeholder="Name">
        <input class="form-control mb-2" placeholder="Email">
        <input type="password" class="form-control mb-2" placeholder="Password">
        <button class="btn btn-primary w-100">Signup</button>
      </div>

    </div>
  </div>
</div>

<!-- 🔷 General Modal -->
<div class="modal fade" id="mainModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5>Info</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">This is a modal popup!</div>
    </div>
  </div>
</div>

<!-- 🔷 Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>© 2026 MyApp</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Dark Mode Toggle
  function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
  }

  // Chart
  const ctx = document.getElementById('myChart');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Jan', 'Feb', 'Mar', 'Apr'],
      datasets: [{
        label: 'Users',
        data: [10, 20, 15, 30],
        backgroundColor: 'blue'
      }]
    }
  });
</script>

</body>
</html>
